# Production overrides — tighter secrets, no port exposure on db, CORS locked to real domain.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    ports: []               # no external port in production

  api:
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      SECRET_KEY: ${SECRET_KEY:?Generate with: python -c "import secrets; print(secrets.token_hex(32))"}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["https://fuel.example.com"]'}
    ports:
      - "8080:8000"
    restart: always