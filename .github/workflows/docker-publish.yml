name: Build & Push Docker Image

on:
  push:
    tags:
      - "v*"

env:
  DOCKERHUB_REPO: whr23333/fuel-tracker

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.VERSION }}
            ${{ env.DOCKERHUB_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### 🐳 Pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.VERSION }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.DOCKERHUB_REPO }}:latest\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Docker image pushed:
            - `docker pull ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.VERSION }}`
            - `docker pull ${{ env.DOCKERHUB_REPO }}:latest`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
